<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="404paghe.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <main class="pagecontent">
    <!-- Using a div for a neon glow effect background -->
    <div class="glitch-container">
      <h2 class="error-title" data-aos="fade-up" data-aos-delay="200">404</h2>
      <h3 class="error-subtitle" data-aos="fade-up" data-aos-delay="400">The link is broken or the page moved.</h3>
      <a href="index.html" class="home-btn" data-aos="fade-up" data-aos-delay="600">Go to Login</a>
    </div>
  </main>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 1000,
      once: true,
    });
  </script>
</body>
</html>
